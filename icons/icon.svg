  <!-- Document lines -->
  <rect x="34" y="44" width="36" height="4" rx="2" fill="#93c5fd"/>
  <rect x="34" y="54" width="28" height="4" rx="2" fill="#93c5fd"/>
  <rect x="34" y="64" width="32" height="4" rx="2" fill="#93c5fd"/>
  <rect x="34" y="74" width="22" height="4" rx="2" fill="#93c5fd"/>

  <!-- Upload arrow (right side) -->
